<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Fondo -->
  <rect width="400" height="400" fill="#f5f5f5"/>
  
  <!-- Borde sutil -->
  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Huella grande central (decorativa, color verde marca) -->
  <!-- Almohadilla principal -->
  <ellipse cx="200" cy="210" rx="42" ry="36" fill="#d4ead4" opacity="0.7"/>
  <!-- Dedos -->
  <ellipse cx="163" cy="178" rx="18" ry="22" fill="#d4ead4" opacity="0.7"/>
  <ellipse cx="195" cy="168" rx="18" ry="22" fill="#d4ead4" opacity="0.7"/>
  <ellipse cx="227" cy="168" rx="18" ry="22" fill="#d4ead4" opacity="0.7"/>
  <ellipse cx="241" cy="181" rx="16" ry="20" fill="#d4ead4" opacity="0.7"/>

  <!-- Ícono cámara / imagen tachada -->
  <g transform="translate(200,190)">
    <!-- Cuerpo cámara -->
    <rect x="-38" y="-26" width="76" height="52" rx="7" fill="none" stroke="#9e9e9e" stroke-width="3"/>
    <!-- Lente -->
    <circle cx="0" cy="0" r="17" fill="none" stroke="#9e9e9e" stroke-width="3"/>
    <circle cx="0" cy="0" r="9" fill="none" stroke="#bdbdbd" stroke-width="2"/>
    <!-- Visor -->
    <rect x="-10" y="-24" width="14" height="6" rx="3" fill="none" stroke="#9e9e9e" stroke-width="2.5"/>
    <!-- Línea diagonal tachando -->
    <line x1="-38" y1="-26" x2="38" y2="26" stroke="#e57373" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Texto principal -->
  <text
    x="200"
    y="300"
    font-family="'Poppins', 'Segoe UI', Arial, sans-serif"
    font-size="15"
    font-weight="600"
    fill="#757575"
    text-anchor="middle"
    letter-spacing="0.5"
  >Sin imagen disponible</text>

  <!-- Texto secundario -->
  <text
    x="200"
    y="322"
    font-family="'Poppins', 'Segoe UI', Arial, sans-serif"
    font-size="11"
    fill="#bdbdbd"
    text-anchor="middle"
  >Huellitas Petshop</text>
</svg>
